<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engaging Math · Adaptive 5th Grade</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&family=Fraunces:ital,wght@0,300;0,700;0,900;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0e14;
  --surface: #16192a;
  --surface2: #1e2236;
  --surface3: #252940;
  --border: rgba(255,255,255,0.1);
  --ink: #ffffff;
  --ink-dim: rgba(255,255,255,0.55);
  --ink-dimmer: rgba(255,255,255,0.22);
  --accent: #7c6bff;
  --accent2: #3ecf8e;
  --accent3: #ff6b6b;
  --gold: #f5c842;
  --m1: #ff7c4d; --m1l: rgba(255,124,77,0.12);
  --m2: #3ecf8e; --m2l: rgba(62,207,142,0.1);
  --m3: #7c6bff; --m3l: rgba(124,107,255,0.1);
  --m4: #f5c842; --m4l: rgba(245,200,66,0.1);
  --m5: #ff6b9d; --m5l: rgba(255,107,157,0.1);
  --m6: #4dd9ff; --m6l: rgba(77,217,255,0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: #ffffff;
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Subtle grid bg */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(circle at 15% 30%, rgba(124,107,255,0.05) 0%, transparent 55%),
                    radial-gradient(circle at 85% 70%, rgba(62,207,142,0.04) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}

/* ══════════════ LAYOUT ══════════════ */
.shell { display: flex; min-height: 100vh; position: relative; z-index: 1; }

/* SIDEBAR */
.sidebar {
  width: 260px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
}

.brand { padding: 24px 20px 18px; border-bottom: 1px solid var(--border); }
.brand-name { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em;
  background: linear-gradient(135deg, #ffffff 0%, rgba(255,255,255,0.75) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.brand-name em { color: var(--accent); font-style: normal; }
.brand-tag { font-family: 'JetBrains Mono', monospace; font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-top: 5px; }

.sidebar-student {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}

.avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; font-weight: 700; color: white; flex-shrink: 0;
}

.student-name { font-size: 0.85rem; font-weight: 700; color: #ffffff; }
.student-grade { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: rgba(255,255,255,0.45); }

/* Module list */
.mod-list { flex: 1; padding: 12px 0; overflow-y: auto; }

.mod-entry {
  padding: 10px 20px;
  cursor: pointer;
  transition: all 0.15s;
  border-left: 3px solid transparent;
  position: relative;
}

.mod-entry:hover { background: var(--surface2); }
.mod-entry.current { border-left-color: var(--accent); background: var(--surface2); }

.mod-entry-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }

.mod-icon {
  width: 20px; height: 20px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; font-weight: 700; flex-shrink: 0;
}

.mod-entry-title { font-size: 0.78rem; font-weight: 700; line-height: 1.2;
  background: linear-gradient(135deg, #ffffff 0%, rgba(255,255,255,0.8) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

.mod-status-row { display: flex; align-items: center; gap: 6px; padding-left: 28px; }

.status-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.55rem; letter-spacing: 0.08em; text-transform: uppercase;
  padding: 2px 6px; border-radius: 3px;
}

.sb-locked { color: var(--ink-dimmer); background: rgba(255,255,255,0.04); }
.sb-assess { color: var(--gold); background: rgba(245,200,66,0.12); }
.sb-learning { color: var(--accent2); background: rgba(62,207,142,0.1); }
.sb-complete { color: var(--accent); background: rgba(124,107,255,0.1); }

.mod-mini-bar {
  width: 60px; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden;
}
.mod-mini-fill { height: 100%; border-radius: 1px; transition: width 0.5s; }

/* ══════════════ MAIN ══════════════ */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* TOP BAR */
.topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 12px 32px; display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}

.topbar-left { display: flex; align-items: center; gap: 12px; }

.phase-tag {
  font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 4px 10px; border-radius: 4px;
}

.phase-assess { color: #ffffff; background: rgba(245,200,66,0.18); border: 1px solid rgba(245,200,66,0.3); }
.phase-learn { color: #ffffff; background: rgba(62,207,142,0.15); border: 1px solid rgba(62,207,142,0.3); }
.phase-complete { color: #ffffff; background: rgba(124,107,255,0.18); border: 1px solid rgba(124,107,255,0.3); }

.topbar-title { font-size: 0.9rem; font-weight: 700; color: #ffffff; }

.topbar-right { display: flex; align-items: center; gap: 16px; }

.streak-badge {
  display: flex; align-items: center; gap: 5px;
  font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: #ffffff;
}

/* CONTENT */
.content { flex: 1; overflow-y: auto; padding: 32px; }

/* ══════════════ PHASE: PRE-ASSESSMENT ══════════════ */

/* Assessment Intro Screen */
.assess-intro {
  max-width: 640px; margin: 0 auto;
  animation: risein 0.4s ease;
}

@keyframes risein {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.assess-hero {
  text-align: center; margin-bottom: 40px; padding-top: 20px;
}

.assess-hero-icon {
  width: 64px; height: 64px; border-radius: 16px;
  margin: 0 auto 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem;
}

.assess-hero h1 {
  font-family: 'Fraunces', serif; font-size: 2.2rem; font-weight: 900;
  line-height: 1.1; margin-bottom: 12px; letter-spacing: -0.02em;
  background: linear-gradient(135deg, #ffffff 30%, rgba(255,255,255,0.7) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.assess-hero p {
  font-size: 0.9rem; color: rgba(255,255,255,0.6); line-height: 1.7; max-width: 480px; margin: 0 auto;
}

.assess-info-grid {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 28px;
}

.info-tile {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px; text-align: center;
}

.info-tile-num {
  font-family: 'Fraunces', serif; font-size: 2rem; font-weight: 900; line-height: 1;
  margin-bottom: 4px;
}

.info-tile-label { font-size: 0.75rem; color: rgba(255,255,255,0.55); }

.topic-preview {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  overflow: hidden; margin-bottom: 28px;
}

.topic-preview-header {
  padding: 12px 18px; border-bottom: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace; font-size: 0.62rem;
  letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.45);
}

.topic-row {
  padding: 10px 18px; display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  font-size: 0.82rem; color: rgba(255,255,255,0.88);
}

.topic-row:last-child { border-bottom: none; }
.topic-letter { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: rgba(255,255,255,0.4); flex-shrink: 0; width: 16px; }

.start-btn {
  width: 100%; padding: 16px; border-radius: 12px; border: none;
  font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
  background: var(--accent);
  color: white;
}

.start-btn:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(124,107,255,0.4); }

/* ══ ASSESSMENT QUESTION ══ */
.assess-q-wrap { max-width: 680px; margin: 0 auto; animation: risein 0.3s ease; }

.q-progress-bar {
  display: flex; align-items: center; gap: 12px; margin-bottom: 28px;
}

.q-pips { display: flex; gap: 4px; flex: 1; }

.q-pip {
  flex: 1; height: 4px; border-radius: 2px; background: var(--border);
  transition: all 0.3s;
}

.q-pip.done { background: var(--accent2); }
.q-pip.current { background: var(--accent); }
.q-pip.wrong-pip { background: var(--accent3); }

.q-counter {
  font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: rgba(255,255,255,0.5); flex-shrink: 0;
}

.topic-indicator {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 10px; border-radius: 5px; margin-bottom: 16px;
  font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase;
  color: rgba(255,255,255,0.9) !important;
}

.q-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  overflow: hidden;
}

.q-card-header {
  padding: 16px 22px; border-bottom: 1px solid var(--border);
  background: var(--surface2);
  display: flex; align-items: center; justify-content: space-between;
}

.q-tag {
  font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: rgba(255,255,255,0.45);
}

.q-body { padding: 24px 22px; }

.q-stem {
  font-family: 'Fraunces', serif; font-size: 1.2rem; font-weight: 300; line-height: 1.6;
  margin-bottom: 24px; color: #ffffff;
}

.q-stem strong { font-weight: 700; }

.choices { display: flex; flex-direction: column; gap: 8px; }

.choice {
  padding: 14px 18px; border-radius: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  color: #ffffff; font-family: 'Syne', sans-serif; font-size: 0.9rem;
  cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 12px;
  text-align: left;
}

.choice:hover { border-color: var(--accent); background: rgba(124,107,255,0.08); }

.choice-key {
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
  color: rgba(255,255,255,0.45); flex-shrink: 0; width: 18px;
}

.choice.correct { border-color: var(--accent2); background: rgba(62,207,142,0.1); }
.choice.correct .choice-key { color: var(--accent2); }
.choice.wrong { border-color: var(--accent3); background: rgba(255,107,107,0.08); }
.choice.wrong .choice-key { color: var(--accent3); }

.q-feedback {
  display: none; padding: 14px 18px; margin-top: 12px; border-radius: 8px;
  font-size: 0.85rem; line-height: 1.5; animation: risein 0.2s ease;
}

.q-feedback.show { display: block; }
.qf-right { background: rgba(62,207,142,0.08); border: 1px solid rgba(62,207,142,0.2); color: var(--accent2); }
.qf-wrong { background: rgba(255,107,107,0.06); border: 1px solid rgba(255,107,107,0.2); color: var(--accent3); }

.q-next {
  display: none; width: 100%; margin-top: 14px; padding: 13px;
  background: var(--surface3); border: 1px solid var(--border); border-radius: 8px;
  color: #ffffff; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem;
  cursor: pointer; transition: all 0.15s;
}

.q-next:hover { background: var(--accent); border-color: var(--accent); }
.q-next.show { display: block; }

/* ══ RESULTS / DIAGNOSIS ══ */
.results-wrap { max-width: 720px; margin: 0 auto; animation: risein 0.4s ease; }

.results-hero { text-align: center; margin-bottom: 32px; }
.results-hero h1 { font-family: 'Fraunces', serif; font-size: 2rem; font-weight: 900; margin-bottom: 8px;
  background: linear-gradient(135deg, #ffffff 30%, rgba(255,255,255,0.7) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.results-hero p { font-size: 0.88rem; color: rgba(255,255,255,0.6); }

.diagnosis-grid {
  display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; margin-bottom: 28px;
}

.diag-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px;
}

.diag-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }

.diag-topic { font-size: 0.85rem; font-weight: 700; color: #ffffff; }

.diag-result {
  font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
  padding: 3px 9px; border-radius: 4px;
}

.dr-pass { color: var(--accent2); background: rgba(62,207,142,0.1); }
.dr-partial { color: var(--gold); background: rgba(245,200,66,0.1); }
.dr-fail { color: var(--accent3); background: rgba(255,107,107,0.1); }

.diag-bar-bg { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
.diag-bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }

.diag-label { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; color: rgba(255,255,255,0.5); }

.gap-summary {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  overflow: hidden; margin-bottom: 24px;
}

.gap-summary-header {
  padding: 14px 20px; background: var(--surface2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}

.gap-summary-title { font-weight: 700; font-size: 0.9rem; color: #ffffff; }

.gap-item {
  padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.03);
  display: flex; align-items: center; gap: 12px; font-size: 0.85rem; color: #ffffff;
}

.gap-item:last-child { border-bottom: none; }

.gap-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.gap-skip { background: var(--accent2); }
.gap-teach { background: var(--accent3); }

.gap-skills { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; color: rgba(255,255,255,0.5); margin-left: auto; }

.cta-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.cta-btn {
  padding: 14px; border-radius: 10px; border: none;
  font-family: 'Syne', sans-serif; font-size: 0.88rem; font-weight: 700;
  cursor: pointer; transition: all 0.15s;
}

.cta-primary { background: var(--accent); color: white; }
.cta-primary:hover { filter: brightness(1.1); }
.cta-secondary { background: var(--surface2); color: #ffffff; border: 1px solid var(--border); }
.cta-secondary:hover { border-color: var(--accent); }

/* ══ LESSON PHASE ══ */
.lesson-wrap { max-width: 700px; margin: 0 auto; animation: risein 0.3s ease; }

.lesson-header { margin-bottom: 24px; }

.lesson-module-tag {
  font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 4px 10px; border-radius: 4px; display: inline-block; margin-bottom: 10px;
}

.lesson-title {
  font-family: 'Fraunces', serif; font-size: 1.7rem; font-weight: 900;
  line-height: 1.15; letter-spacing: -0.02em; margin-bottom: 8px;
  background: linear-gradient(135deg, #ffffff 40%, rgba(255,255,255,0.65) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.lesson-gap-context {
  padding: 10px 14px; border-radius: 7px; font-size: 0.8rem;
  color: var(--accent3); background: rgba(255,107,107,0.06);
  border: 1px solid rgba(255,107,107,0.18); margin-bottom: 20px;
  font-family: 'JetBrains Mono', monospace; letter-spacing: 0.02em;
}

/* Worked example */
.worked-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  overflow: hidden; margin-bottom: 20px;
}

.worked-header {
  padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface2);
  display: flex; align-items: center; justify-content: space-between;
}

.worked-label {
  font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
  letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.5);
}

.worked-body { padding: 20px; }

.worked-stem {
  font-family: 'Fraunces', serif; font-size: 1.05rem; font-weight: 300; line-height: 1.65;
  margin-bottom: 18px; padding: 14px; background: var(--surface2); border-radius: 8px;
  border-left: 3px solid var(--gold); color: #ffffff;
}

.step-list { list-style: none; }

.step-item { display: flex; gap: 12px; margin-bottom: 12px; }

.step-num {
  width: 24px; height: 24px; border-radius: 6px;
  background: var(--surface3); border: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
  display: flex; align-items: center; justify-content: center;
  color: var(--accent); flex-shrink: 0; margin-top: 2px;
}

.step-label { font-family: 'JetBrains Mono', monospace; font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.5); margin-bottom: 2px; }
.step-text { font-size: 0.88rem; line-height: 1.55; color: #ffffff; }
.step-text strong { color: var(--accent2); }

/* Practice */
.practice-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  overflow: hidden; margin-bottom: 20px;
}

.practice-header {
  padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface2);
  font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
  letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.5);
  display: flex; align-items: center; justify-content: space-between;
}

.mastery-pips-row { display: flex; gap: 4px; }
.mpip { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: all 0.3s; }
.mpip.lit { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }

.practice-body { padding: 20px; }

.practice-q {
  font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 300; line-height: 1.65;
  margin-bottom: 18px; color: #ffffff;
}

.p-feedback { display: none; padding: 12px 16px; border-radius: 8px; font-size: 0.85rem; line-height: 1.5; margin-bottom: 12px; }
.p-feedback.show { display: block; animation: risein 0.2s ease; }
.pf-right { background: rgba(62,207,142,0.08); border: 1px solid rgba(62,207,142,0.2); color: var(--accent2); }
.pf-wrong { background: rgba(255,107,107,0.06); border: 1px solid rgba(255,107,107,0.18); color: var(--accent3); }

.p-next { display: none; width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface3); color: #ffffff; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: all 0.15s; }
.p-next.show { display: block; }
.p-next:hover { background: var(--accent); border-color: var(--accent); }

/* Queue bar */
.queue-bar {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 18px; margin-bottom: 20px;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}

.queue-label { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.45); margin-right: 4px; }

.q-skill-tag {
  padding: 5px 10px; border-radius: 5px; font-family: 'JetBrains Mono', monospace;
  font-size: 0.62rem; border: 1px solid; transition: all 0.15s; cursor: default;
}

.qt-current { color: var(--accent); border-color: rgba(124,107,255,0.4); background: rgba(124,107,255,0.1); }
.qt-pending { color: rgba(255,255,255,0.4); border-color: rgba(255,255,255,0.12); background: transparent; }
.qt-done { color: var(--accent2); border-color: rgba(62,207,142,0.3); background: rgba(62,207,142,0.05); text-decoration: line-through; }

/* MODULE COMPLETE */
.complete-wrap { max-width: 600px; margin: 60px auto 0; text-align: center; animation: risein 0.5s ease; }

.complete-badge {
  width: 80px; height: 80px; border-radius: 20px; margin: 0 auto 24px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center; font-size: 2rem;
}

.complete-wrap h1 { font-family: 'Fraunces', serif; font-size: 2.2rem; font-weight: 900; margin-bottom: 10px;
  background: linear-gradient(135deg, #ffffff 30%, rgba(255,255,255,0.7) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

//  - Answers are shuffled so correct answer is never always A
//  - Khan Academy links per topic for struggling students

// Shuffle answer choices while tracking the correct answer
function shuffleChoices(choices, correctIdx) {
  const correct = choices[correctIdx];
  const shuffled = [...choices];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return { choices: shuffled, correct: shuffled.indexOf(correct) };
}

// Draw N random non-repeating questions from a bank
function drawQuestions(bank, n, usedIndices) {
  const available = bank.map((_, i) => i).filter(i => !usedIndices.includes(i));
  const shuffled = available.sort(() => Math.random() - 0.5);
  const picked = shuffled.slice(0, Math.min(n, shuffled.length));
  return picked.map(i => {
    const q = bank[i];
    const { choices, correct } = shuffleChoices(q.choices, q.correct);
    return { ...q, choices, correct, bankIdx: i };
  });
}

// Per-session used question tracking
const usedQuestions = {};

function getAssessmentQuestions(moduleId) {
  const key = 'assess_' + moduleId;
  if (!usedQuestions[key]) usedQuestions[key] = [];
  const m = MODULES[moduleId];
  // Pick 2 questions per topic from bank
  const questions = [];
  m.topicBanks.forEach((bank, topicIdx) => {
    const drawn = drawQuestions(bank, 2, []);
    drawn.forEach(q => questions.push({ ...q, topicIdx }));
  });
  // Shuffle order
  return questions.sort(() => Math.random() - 0.5);
}

function getPracticeQuestion(moduleId, topicId) {
  const key = moduleId + '_' + topicId;
  if (!usedQuestions[key]) usedQuestions[key] = [];
  const m = MODULES[moduleId];
  const bank = m.topicBanks[m.topics.findIndex(t => t.id === topicId)] || [];
  const drawn = drawQuestions(bank, 1, usedQuestions[key]);
  if (drawn.length > 0) {
    usedQuestions[key].push(drawn[0].bankIdx);
    // Reset if all used
    if (usedQuestions[key].length >= bank.length) usedQuestions[key] = [];
    return drawn[0];
  }
  // Fallback: reset and redraw
  usedQuestions[key] = [];
  const retry = drawQuestions(bank, 1, []);
  return retry[0] || bank[0];
}

//  STORAGE HELPERS
// ══════════════════════════════════════════════════════════════════
const STORAGE_KEY = 'apex_5th_grade';

function saveState() {
  try {
    const toSave = {
      studentName: state.studentName,
      currentModule: state.currentModule,
      phase: (state.phase === 'assessing' || state.phase === 'results') ? 'intro' : state.phase,
      assessIdx: 0,
      assessAnswers: [],
      topicResults: state.topicResults,
      gapTopics: state.gapTopics,
      passTopics: state.passTopics,
      lessonIdx: state.lessonIdx,
      lessonMastery: 0,
      lessonAnswered: false,
      moduleStates: state.moduleStates,
      lessonQueueIds: state.lessonQueue.map(l => l.topicId),
      savedAt: Date.now()
    };
    localStorage.setItem(STORAGE_KEY + '_' + state.studentName, JSON.stringify(toSave));
  } catch(e) { console.warn('Save failed', e); }
}

function loadState(studentName) {
  try {
    const raw = localStorage.getItem(STORAGE_KEY + '_' + studentName);
    if (!raw) return null;
    const saved = JSON.parse(raw);
    const m = MODULES[saved.currentModule];
    saved.lessonQueue = (saved.lessonQueueIds || [])
      .map(id => m.lessons.find(l => l.topicId === id))
      .filter(Boolean);
    delete saved.lessonQueueIds;
    return saved;
  } catch(e) { return null; }
}

function getAllStudents() {
  const students = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith(STORAGE_KEY + '_')) {
      const name = key.replace(STORAGE_KEY + '_', '');
      try {
        const data = JSON.parse(localStorage.getItem(key));
        const completedCount = (data.moduleStates || []).filter(s => s === 'complete').length;
        students.push({ name, savedAt: data.savedAt, moduleStates: data.moduleStates, currentModule: data.currentModule, phase: data.phase, completedCount });
      } catch(e) {}
    }
  }
  return students.sort((a,b) => b.savedAt - a.savedAt);
}

function deleteStudent(name) {
  if (confirm('Delete all progress for ' + name + '? This cannot be undone.')) {
    localStorage.removeItem(STORAGE_KEY + '_' + name);
    showStudentPicker();
  }
}

function freshState(studentName) {
  const s = {
    studentName: studentName || 'Student',
    currentModule: 0,
    phase: 'intro',
    assessIdx: 0,
    assessAnswers: [],
    currentAssessment: [],
    topicResults: {},
    gapTopics: [],
    passTopics: [],
    lessonQueue: [],
    lessonIdx: 0,
    lessonMastery: 0,
    lessonAnswered: false,
    wrongStreak: 0,
    currentPracticeQ: null,
    moduleStates: []
  };
  MODULES.forEach((_, i) => s.moduleStates.push(i === 0 ? 'assess' : 'locked'));
  return s;
}

//  STUDENT PICKER  (shown on first load / logout)
// ══════════════════════════════════════════════════════════════════
function showStudentPicker() {
  try {
    document.querySelector('.sidebar').style.display = 'none';
    document.querySelector('.main').style.width = '100%';
  } catch(e) {}

  const students = getAllStudents();

  const timeAgo = (ts) => {
    if (!ts) return 'Never';
    const mins = Math.round((Date.now() - ts) / 60000);
    if (mins < 2) return 'Just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.round(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    return Math.round(hrs / 24) + 'd ago';
  };

  const phaseLabel = {
    intro: 'Ready for diagnostic', assessing: 'Mid-assessment',
    results: 'Reviewing results', learning: 'In lessons', complete: 'Module complete'
  };

  const el = document.getElementById('content');
  if (!el) return;

  // Build HTML safely using DOM manipulation to avoid quote issues
  const wrap = document.createElement('div');
  wrap.style.cssText = 'max-width:520px;margin:48px auto;';

  // Hero
  wrap.innerHTML = `
    <div style="text-align:center;margin-bottom:40px;">
      <div style="font-size:2.5rem;margin-bottom:12px;">📚</div>
      <h1 style="font-family:'Fraunces',serif;font-size:2rem;font-weight:900;letter-spacing:-0.02em;margin-bottom:8px;color:#ffffff;">Who's learning today?</h1>
      <p style="color:rgba(255,255,255,0.55);font-size:0.88rem;">Progress is saved automatically on this device.</p>
    </div>
  `;

  // Returning students
  if (students.length > 0) {
    const modColors = ['#ff7c4d','#3ecf8e','#7c6bff'];
    const section = document.createElement('div');
    section.style.marginBottom = '24px';

      style="width:100%;padding:12px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:#ffffff;font-family:'Syne',sans-serif;font-size:0.95rem;outline:none;margin-bottom:10px;box-sizing:border-box;" />
    <button id="start-btn" style="width:100%;padding:13px;background:var(--accent);border:none;border-radius:8px;color:white;font-family:'Syne',sans-serif;font-weight:700;font-size:0.9rem;cursor:pointer;">
      Start Learning →

  wrap.appendChild(formBox);

  // Manage link

    wrap.appendChild(mgmt);

  // Wire up events after DOM insertion

  try {
    document.getElementById('phase-tag').textContent = 'Welcome';

function loginStudent(name) {
  const saved = loadState(name);
  if (saved) {
    state = saved;
  } else {
    state = freshState(name);
  }
  document.querySelector('.sidebar').style.display = '';
  document.querySelector('.main').style.width = '';
  render();
}

function startNewStudent() {
  const name = (document.getElementById('name-input')?.value || '').trim();
  if (!name) { alert('Please enter your name first!'); return; }
  state = freshState(name);
  saveState();
  document.querySelector('.sidebar').style.display = '';
  document.querySelector('.main').style.width = '';
  render();
}

// ══════════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════════
let state = freshState('Student');

// ══════════════════════════════════════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════════════════════════════════════
function buildSidebar() {
  document.getElementById('student-display').textContent = state.studentName;
  document.getElementById('avatar').textContent = state.studentName[0].toUpperCase();

  document.getElementById('mod-list').innerHTML = MODULES.map((m, i) => {
    const ms = state.moduleStates[i];
    const isCurrent = i === state.currentModule;
    const statusLabels = { locked:'🔒 Locked', assess:'📋 Diagnostic', learning:'📚 Learning', complete:'✓ Complete' };
    const statusClass = { locked:'sb-locked', assess:'sb-assess', learning:'sb-learning', complete:'sb-complete' };
    const prog = ms === 'complete' ? 100 : ms === 'learning' ? Math.round((state.lessonIdx / Math.max(state.lessonQueue.length,1)) * 100) : 0;

    return `
      <div class="mod-entry ${isCurrent ? 'current' : ''}" onclick="switchModule(${i})">
        <div class="mod-entry-header">
          <div class="mod-icon" style="background:${m.light};color:${m.color}">${i+1}</div>
          <div class="mod-entry-title">${m.shortTitle}</div>
        </div>
        <div class="mod-status-row">
          <div class="status-badge ${statusClass[ms]}">${statusLabels[ms]}</div>
          <div class="mod-mini-bar"><div class="mod-mini-fill" style="background:${m.color};width:${prog}%"></div></div>
        </div>
      </div>
    `;
  }).join('');
}

function switchModule(i) {
  const ms = state.moduleStates[i];
  if (ms === 'locked') return;
  state.currentModule = i;
  state.phase = ms === 'complete' ? 'complete' :
                ms === 'assess' ? 'intro' :
                ms === 'learning' ? 'learning' : 'intro';
  state.assessIdx = 0;
  state.assessAnswers = [];
  buildSidebar();
  updateTopbar();
  render();
}

// ══════════════════════════════════════════════════════════════════
//  TOPBAR
// ══════════════════════════════════════════════════════════════════
function updateTopbar() {
  const m = MODULES[state.currentModule];
  const phaseLabels = { intro:'Diagnostic', assessing:'Pre-Assessment', results:'Results', learning:'Targeted Lessons', complete:'Module Complete' };
  const phaseClass  = { intro:'phase-assess', assessing:'phase-assess', results:'phase-assess', learning:'phase-learn', complete:'phase-complete' };
  const ph = state.phase;
  document.getElementById('phase-tag').textContent = phaseLabels[ph] || '';
  document.getElementById('phase-tag').className = 'phase-tag ' + (phaseClass[ph] || 'phase-assess');
  document.getElementById('topbar-title').textContent = `Module ${state.currentModule+1}: ${m.shortTitle}`;
}

// ══════════════════════════════════════════════════════════════════
//  RENDER ROUTER
// ══════════════════════════════════════════════════════════════════
function render() {
  updateTopbar();
  buildSidebar();
  const ph = state.phase;
  if (ph === 'intro')      renderIntro();
  else if (ph === 'assessing') renderQuestion();
  else if (ph === 'results')   renderResults();
  else if (ph === 'learning')  renderLesson();
  else if (ph === 'complete')  renderComplete();
}

// ══════════════════════════════════════════════════════════════════
//  PHASE 1: INTRO
// ══════════════════════════════════════════════════════════════════
function renderIntro() {
  const m = MODULES[state.currentModule];
  const qCount = m.topics.length * 2; // 2 questions per topic
  const topicCount = m.topics.length;

  document.getElementById('content').innerHTML = `
    <div class="assess-intro">
      <div class="assess-hero">
        <div class="assess-hero-icon" style="background:${m.light};font-size:2rem">📋</div>
        <h1 class="assess-module-h1">Module ${state.currentModule+1}<br>Pre-Assessment</h1>
        <p>
          Before teaching you anything, let's find out what you <em>already know</em>.
          This diagnostic covers all ${topicCount} topics in <strong>${m.title}</strong>.
          Topics you pass will be <strong>skipped</strong> — you'll only learn what you actually need.
        </p>
      </div>

      <div class="assess-info-grid">
        <div class="info-tile">
          <div class="info-tile-num" style="color:${m.color}">${qCount}</div>
          <div class="info-tile-label">Questions</div>
        </div>
        <div class="info-tile">
          <div class="info-tile-num" style="color:${m.color}">${topicCount}</div>
          <div class="info-tile-label">Topics Tested</div>
        </div>
        <div class="info-tile">
          <div class="info-tile-num" style="color:${m.color}">~${qCount * 2}m</div>
          <div class="info-tile-label">Est. Time</div>
        </div>
      </div>

      <div class="topic-preview">
        <div class="topic-preview-header">Topics in this module</div>
        ${m.topics.map(t => `
          <div class="topic-row">
            <span class="topic-letter">${t.label}</span>
            <span>${t.name}</span>
            <span style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:rgba(255,255,255,0.45)">${t.skills} skills</span>
          </div>
        `).join('')}
      </div>

      <button class="start-btn" onclick="startAssessment()">
        Start Pre-Assessment →
      </button>
    </div>
  `;
}

// ══════════════════════════════════════════════════════════════════
//  PHASE 2: ASSESSMENT QUESTIONS
// ══════════════════════════════════════════════════════════════════
function startAssessment() {
  const m = MODULES[state.currentModule];
  state.phase = 'assessing';
  state.assessIdx = 0;
  state.assessAnswers = [];
  // Draw fresh randomized questions from bank
  state.currentAssessment = getAssessmentQuestions(state.currentModule);
  // Initialize topic result buckets
  state.topicResults = {};
  m.topics.forEach((_, i) => { state.topicResults[i] = { total: 0, correct: 0 }; });
  state.currentAssessment.forEach(q => {
    if (!state.topicResults[q.topicIdx]) state.topicResults[q.topicIdx] = { total: 0, correct: 0 };
    state.topicResults[q.topicIdx].total++;
  });
  render();
}

function renderQuestion() {
  const m = MODULES[state.currentModule];
  if (!state.currentAssessment || state.currentAssessment.length === 0) {
    state.currentAssessment = getAssessmentQuestions(state.currentModule);
  }
  const q = state.currentAssessment[state.assessIdx];
  const total = state.currentAssessment.length;

  document.getElementById('content').innerHTML = `
    <div class="assess-q-wrap">
      <div class="q-progress-bar">
        <div class="q-pips">
          ${state.currentAssessment.map((_, i) => {
            const ans = state.assessAnswers[i];
            const cls = i < state.assessIdx ? (ans?.correct ? 'done' : 'wrong-pip') : i === state.assessIdx ? 'current' : '';
            return `<div class="q-pip ${cls}"></div>`;
          }).join('')}
        </div>
        <div class="q-counter">${state.assessIdx + 1} / ${total}</div>
      </div>

      <div class="topic-indicator" style="background:${m.light};color:${m.color}">
        📋 Topic ${String.fromCharCode(65 + q.topicIdx)} — Module ${state.currentModule+1} Diagnostic
      </div>

      <div class="q-card">
        <div class="q-card-header">
          <span class="q-tag">Pre-Assessment · ${m.ccss}</span>
          <span class="q-tag">${m.topics[q.topicIdx]?.name || ''}</span>
        </div>
        <div class="q-body">
          <div class="q-stem">${q.stem}</div>
          <div class="choices" id="choices">
            ${q.choices.map((c, i) => `
              <button class="choice" onclick="answerAssessment(${i})">
                <span class="choice-key">${['A','B','C','D'][i]}</span>
                <span>${c}</span>
              </button>
            `).join('')}
          </div>
          <div class="q-feedback" id="q-feedback"></div>
          <button class="q-next" id="q-next" onclick="nextAssessmentQ()">
            ${state.assessIdx + 1 < total ? 'Next Question →' : 'See My Results →'}
          </button>
        </div>
      </div>
    </div>
  `;
}

function answerAssessment(chosen) {
  const m = MODULES[state.currentModule];
  const q = state.currentAssessment[state.assessIdx];
  const isRight = chosen === q.correct;
  const choices = document.querySelectorAll('.choice');
  choices.forEach(b => b.style.pointerEvents = 'none');
  choices[q.correct].classList.add('correct');
  if (!isRight) choices[chosen].classList.add('wrong');

  const fb = document.getElementById('q-feedback');
  fb.className = `q-feedback show ${isRight ? 'qf-right' : 'qf-wrong'}`;
  fb.textContent = (isRight ? '✓ ' : '✗ ') + q.explain;

  state.assessAnswers[state.assessIdx] = { topicIdx: q.topicIdx, correct: isRight };
  if (isRight) state.topicResults[q.topicIdx].correct++;

  document.getElementById('q-next').classList.add('show');
}

function nextAssessmentQ() {
  state.assessIdx++;
  if (state.assessIdx >= state.currentAssessment.length) {
    computeGaps();
    state.phase = 'results';
  }
  saveState();
  render();
}

// ══════════════════════════════════════════════════════════════════
//  GAP COMPUTATION
// ══════════════════════════════════════════════════════════════════
function computeGaps() {
  const m = MODULES[state.currentModule];
  state.gapTopics = [];
  state.passTopics = [];

  m.topics.forEach((topic, i) => {
    const r = state.topicResults[i];
    if (!r || r.total === 0) {
      // Not tested — need to teach
      state.gapTopics.push(i);
      return;
    }
    const pct = r.correct / r.total;
    if (pct >= 0.75) {
      state.passTopics.push(i);
    } else {
      state.gapTopics.push(i);
    }
  });

  // Build lesson queue from gap topics (only topics that have a lesson defined)
  state.lessonQueue = m.lessons.filter(l => {
    const topicIdx = m.topics.findIndex(t => t.id === l.topicId);
    return state.gapTopics.includes(topicIdx);
  });
  state.lessonIdx = 0;
  state.lessonMastery = 0;
  state.wrongStreak = 0;
  state.currentPracticeQ = null;
}

// ══════════════════════════════════════════════════════════════════
//  PHASE 3: RESULTS / DIAGNOSIS
// ══════════════════════════════════════════════════════════════════
function renderResults() {
  const m = MODULES[state.currentModule];
  const gapCount = state.gapTopics.length;
  const passCount = state.passTopics.length;
  const totalSkipsSkilled = state.passTopics.reduce((sum, i) => sum + m.topics[i].skills, 0);

  document.getElementById('content').innerHTML = `
    <div class="results-wrap">
      <div class="results-hero">
        <h1>Diagnostic Complete</h1>
        <p>We've identified exactly what you need — and what you can skip. Here's your personalized learning plan.</p>
      </div>

      <div class="diagnosis-grid">
        ${m.topics.map((topic, i) => {
          const r = state.topicResults[i] || { total: 0, correct: 0 };
          const pct = r.total > 0 ? Math.round((r.correct / r.total) * 100) : 0;
          const isPass = state.passTopics.includes(i);
          const isGap  = state.gapTopics.includes(i);
          const notTested = r.total === 0;
          const resultLabel = notTested ? 'Not Tested' : isPass ? 'Mastered ✓' : pct >= 50 ? 'Partial' : 'Needs Work';
          const resultClass = notTested ? 'dr-partial' : isPass ? 'dr-pass' : 'dr-fail';
          const barColor = isPass ? 'var(--accent2)' : isGap ? 'var(--accent3)' : 'var(--gold)';
          const displayPct = notTested ? 0 : pct;

          return `
            <div class="diag-card">
              <div class="diag-card-header">
                <div class="diag-topic">Topic ${topic.label}: ${topic.name.split(' ').slice(0,4).join(' ')}…</div>
                <div class="diag-result ${resultClass}">${resultLabel}</div>
              </div>
              <div class="diag-bar-bg">
                <div class="diag-bar-fill" style="width:${displayPct}%;background:${barColor}"></div>
              </div>
              <div class="diag-label">${notTested ? 'Will be taught' : `${r.correct}/${r.total} correct (${pct}%)`}</div>
            </div>
          `;
        }).join('')}
      </div>

      <div class="gap-summary">
        <div class="gap-summary-header">
          <div class="gap-summary-title">Your Personalized Plan</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:rgba(255,255,255,0.45)">${state.lessonQueue.length} lessons queued</div>
        </div>

        ${state.passTopics.length > 0 ? state.passTopics.map(i => `
          <div class="gap-item">
            <div class="gap-dot gap-skip"></div>
            <div>
              <div style="font-size:0.85rem;font-weight:600">Topic ${m.topics[i].label}: ${m.topics[i].name}</div>
              <div style="font-size:0.75rem;color:rgba(255,255,255,0.5)">Mastered — added to spaced repetition queue</div>
            </div>
            <div class="gap-skills">+${m.topics[i].skills} skills banked</div>
          </div>
        `).join('') : ''}

        ${state.gapTopics.map(i => `
          <div class="gap-item">
            <div class="gap-dot gap-teach"></div>
            <div>
              <div style="font-size:0.85rem;font-weight:600">Topic ${m.topics[i].label}: ${m.topics[i].name}</div>
              <div style="font-size:0.75rem;color:rgba(255,255,255,0.55)">Needs instruction — ${m.topics[i].skills} skills to learn</div>
            </div>
            <div class="gap-skills">${m.topics[i].skills} skills</div>
          </div>
        `).join('')}
      </div>

      ${totalSkipsSkilled > 0 ? `
        <div style="background:rgba(62,207,142,0.06);border:1px solid rgba(62,207,142,0.2);border-radius:10px;padding:14px 18px;margin-bottom:20px;font-size:0.85rem;color:var(--accent2);">
          🎉 You already know <strong>${passCount} topic${passCount>1?'s':''}</strong> (~${totalSkipsSkilled} skills) — those are <strong>skipped</strong> and banked into your review queue. Time saved!
        </div>
      ` : ''}

      <div class="cta-row">
        <button class="cta-btn cta-primary" onclick="startLearning()">
          ${state.lessonQueue.length > 0 ? `Begin ${state.lessonQueue.length} Targeted Lesson${state.lessonQueue.length>1?'s':''} →` : 'Mark Module Complete →'}
        </button>
        <button class="cta-btn cta-secondary" onclick="retakeAssessment()">
          Retake Assessment
        </button>
      </div>
    </div>
  `;
}

function retakeAssessment() {
  state.phase = 'intro';
  state.assessIdx = 0;
  state.assessAnswers = [];
  render();
}

// ══════════════════════════════════════════════════════════════════
//  PHASE 4: TARGETED LESSONS
// ══════════════════════════════════════════════════════════════════
function startLearning() {
  if (state.lessonQueue.length === 0) {
    markModuleComplete();
    return;
  }
  state.moduleStates[state.currentModule] = 'learning';
  state.phase = 'learning';
  state.lessonIdx = 0;
  state.lessonMastery = 0;
  state.lessonAnswered = false;
  saveState();
  render();
}

function renderLesson() {
  if (state.lessonIdx >= state.lessonQueue.length) {
    markModuleComplete();
    return;
  }

  const m = MODULES[state.currentModule];
  const lesson = state.lessonQueue[state.lessonIdx];
  state.lessonAnswered = false;

  // Draw a fresh non-repeating practice question from the bank
  state.currentPracticeQ = getPracticeQuestion(state.currentModule, lesson.topicId);

  // Queue visualization
  const queueHtml = state.lessonQueue.map((l, i) => {
    const cls = i < state.lessonIdx ? 'qt-done' : i === state.lessonIdx ? 'qt-current' : 'qt-pending';
    return `<span class="q-skill-tag ${cls}">${i < state.lessonIdx ? '✓ ' : ''}${l.title.split(' ').slice(0,3).join(' ')}</span>`;
  }).join('');

  const pipsHtml = [0,1,2,3,4].map(i =>
    `<div class="mpip ${i < state.lessonMastery ? 'lit' : ''}" id="mpip-${i}"></div>`
  ).join('');

  document.getElementById('content').innerHTML = `
    <div class="lesson-wrap">

      <!-- Queue bar -->
      <div class="queue-bar">
        <span class="queue-label">Lesson ${state.lessonIdx+1}/${state.lessonQueue.length}</span>
        ${queueHtml}
      </div>

      <!-- Lesson header -->
      <div class="lesson-header">
        <div class="lesson-module-tag" style="background:${m.light};color:${m.color}">Module ${state.currentModule+1} · Targeted Instruction</div>
        <h1 class="lesson-title">${lesson.title}</h1>
        <div class="lesson-gap-context">${lesson.gap}</div>
      </div>

      <!-- Worked example -->
      <div class="worked-card">
        <div class="worked-header">
          <span class="worked-label">Worked Example — Cognitive Load Minimized</span>
          <span class="worked-label" style="color:${m.color}">M${state.currentModule+1}</span>
        </div>
        <div class="worked-body">
          <div class="worked-stem">${lesson.stem}</div>
          <ul class="step-list">
            ${lesson.steps.map((s, i) => `
              <li class="step-item">
                <div class="step-num">${i+1}</div>
                <div>
                  <div class="step-label">${s.tag}</div>
                  <div class="step-text">${s.text}</div>
                </div>
              </li>
            `).join('')}
          </ul>
        </div>
      </div>

      <!-- Practice -->
      <div class="practice-card">
        <div class="practice-header">
          <span>Your Turn — Deliberate Practice</span>
          <div class="mastery-pips-row">${pipsHtml}</div>
        </div>
        <div class="practice-body">
          <div class="practice-q" id="p-question">${state.currentPracticeQ ? state.currentPracticeQ.stem : ''}</div>
          <div class="choices" id="p-choices">
            ${state.currentPracticeQ ? state.currentPracticeQ.choices.map((c, i) => `
              <button class="choice" onclick="answerLesson(${i})">
                <span class="choice-key">${['A','B','C','D'][i]}</span>
                <span>${c}</span>
              </button>
            `).join('') : ''}
          </div>
          <div class="p-feedback" id="p-feedback"></div>
          <div id="khan-link" style="display:none;margin-top:14px;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.1);">
            <div style="padding:10px 14px;background:rgba(255,255,255,0.06);font-family:monospace;font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.5);">
              Need more help? Try these resources:
            </div>
            <div style="display:flex;flex-direction:column;gap:1px;background:rgba(255,255,255,0.06);">
              <a id="khan-anchor" href="#" target="_blank" rel="noopener"
                style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:#16192a;text-decoration:none;transition:background 0.15s;"
                onmouseover="this.style.background='#1e2236'" onmouseout="this.style.background='#16192a'">
                <div style="width:32px;height:32px;border-radius:8px;background:rgba(26,179,148,0.15);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;">🎓</div>
                <div>
                  <div style="font-weight:700;font-size:0.85rem;color:#1ab394;">Khan Academy Practice</div>
                  <div style="font-size:0.72rem;color:rgba(255,255,255,0.5);">Video lessons + interactive exercises</div>
                </div>
                <div style="margin-left:auto;color:rgba(255,255,255,0.3);font-size:1rem;">›</div>
              </a>
              <a id="zearn-anchor" href="https://www.zearn.org/" target="_blank" rel="noopener"
                style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:#16192a;text-decoration:none;transition:background 0.15s;"
                onmouseover="this.style.background='#1e2236'" onmouseout="this.style.background='#16192a'">
                <div style="width:32px;height:32px;border-radius:8px;background:rgba(99,102,241,0.15);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;">⭐</div>
                <div>
                  <div style="font-weight:700;font-size:0.85rem;color:#818cf8;">Zearn Math Lesson</div>
                  <div id="zearn-label" style="font-size:0.72rem;color:rgba(255,255,255,0.5);">Visual models + animated instruction</div>
                </div>
                <div style="margin-left:auto;color:rgba(255,255,255,0.3);font-size:1rem;">›</div>
              </a>
            </div>
            <div style="padding:8px 14px;background:rgba(255,255,255,0.03);font-size:0.65rem;color:rgba(255,255,255,0.35);">
              💡 Log into your Zearn account to access the lesson · Khan Academy is always free & no login needed
            </div>
          </div>
          <button class="p-next" id="p-next" onclick="advanceLesson()">
            ${state.lessonMastery >= 4 && state.lessonIdx + 1 >= state.lessonQueue.length
              ? 'Finish Module →'
              : state.lessonMastery >= 4
              ? 'Next Lesson →'
              : 'Next Problem →'}
          </button>
        </div>
      </div>

      <!-- Mastery explainer -->
      <div style="padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:0.8rem;color:rgba(255,255,255,0.6);line-height:1.6;">
        <strong style="color:#ffffff">🎯 Mastery gating:</strong> Fill all 5 pips to demonstrate mastery of this topic.
        Correct answers fill a pip. Incorrect answers provide corrective feedback — no pip lost, but no progress either.
        Once mastered, this skill enters your <strong style="color:var(--accent)">spaced repetition queue</strong>.
      </div>
    </div>
  `;
}

function answerLesson(chosen) {
  if (state.lessonAnswered) return;
  state.lessonAnswered = true;

  const m = MODULES[state.currentModule];
  const lesson = state.lessonQueue[state.lessonIdx];
  const pq = state.currentPracticeQ;
  const correct = pq.correct;
  const isRight = chosen === correct;

  const choices = document.querySelectorAll('#p-choices .choice');
  choices.forEach(b => b.style.pointerEvents = 'none');
  choices[correct].classList.add('correct');
  if (!isRight) choices[chosen].classList.add('wrong');

  const fb = document.getElementById('p-feedback');
  fb.className = `p-feedback show ${isRight ? 'pf-right' : 'pf-wrong'}`;
  fb.textContent = (isRight ? '✓ ' : '✗ ') + pq.explain;

  // Show Khan Academy link after wrong answer (up to 2 wrong answers on this topic)
  if (!isRight) {
    state.wrongStreak = (state.wrongStreak || 0) + 1;
    if (state.wrongStreak >= 2) {
      const topic = m.topics.find(t => t.id === lesson.topicId);
      if (topic) {
        const khanDiv = document.getElementById('khan-link');
        const khanA = document.getElementById('khan-anchor');
        const zearnA = document.getElementById('zearn-anchor');
        const zearnLabel = document.getElementById('zearn-label');
        if (khanDiv) {
          if (khanA && topic.khan) khanA.href = topic.khan;
          if (zearnA && topic.zearn) zearnA.href = topic.zearn;
          if (zearnLabel) zearnLabel.textContent = 'Log in & find this exact lesson on Zearn';
          khanDiv.style.display = 'block';
        }
      }
    }
  } else {
    state.wrongStreak = 0;
  }

  if (isRight) {
    state.lessonMastery = Math.min(state.lessonMastery + 1, 5);
    for (let i = 0; i < 5; i++) {
      const pip = document.getElementById('mpip-' + i);
      if (pip) pip.className = 'mpip' + (i < state.lessonMastery ? ' lit' : '');
    }
  }

  const nextBtn = document.getElementById('p-next');
  if (nextBtn) {
    nextBtn.classList.add('show');
    if (state.lessonMastery >= 5 && state.lessonIdx + 1 >= state.lessonQueue.length) {
      nextBtn.textContent = 'Finish Module →';
    } else if (state.lessonMastery >= 5) {
      nextBtn.textContent = 'Next Lesson →';
    } else {
      nextBtn.textContent = isRight ? 'Next Problem →' : 'Try Again →';
    }
  }
}

function advanceLesson() {
  if (state.lessonMastery >= 5) {
    // Topic mastered — move to next lesson
    state.lessonIdx++;
    state.lessonMastery = 0;
    state.lessonAnswered = false;
    state.wrongStreak = 0;
    saveState();
    if (state.lessonIdx >= state.lessonQueue.length) {
      markModuleComplete();
      return;
    }
  } else {
    // Not mastered — load a NEW non-repeating question from the bank
    state.lessonAnswered = false;
    const lesson = state.lessonQueue[state.lessonIdx];
    state.currentPracticeQ = getPracticeQuestion(state.currentModule, lesson.topicId);
  }
  render();
}

// ══════════════════════════════════════════════════════════════════
//  PHASE 5: MODULE COMPLETE
// ══════════════════════════════════════════════════════════════════
function markModuleComplete() {
  state.moduleStates[state.currentModule] = 'complete';
  // Unlock next module
  if (state.currentModule + 1 < MODULES.length) {
    state.moduleStates[state.currentModule + 1] = 'assess';
  }
  state.phase = 'complete';
  saveState();
  render();
}

function renderComplete() {
  const m = MODULES[state.currentModule];
  const nextMod = MODULES[state.currentModule + 1];
  const skippedTopics = state.passTopics.map(i => m.topics[i]);
  const taughtTopics  = state.gapTopics.map(i => m.topics[i]);

  document.getElementById('content').innerHTML = `
    <div class="complete-wrap">
      <div class="complete-badge">🏆</div>
      <h1>Module ${state.currentModule + 1} Complete!</h1>
      <p>
        You've mastered <strong>${m.title}</strong>. 
        All skills are now in your spaced repetition queue — the system will resurface them at exactly the right time to fight the forgetting curve.
      </p>

      <div class="skip-info">
        <div class="skip-info-label">What happened to each topic</div>
        ${skippedTopics.map(t => `
          <div class="skip-row">
            <span class="skip-check">✓</span>
            <span>Topic ${t.label}: ${t.name}</span>
            <span class="skip-arrow" style="margin-left:auto">→</span>
            <span style="font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--accent2)">Pre-known · banked</span>
          </div>
        `).join('')}
        ${taughtTopics.map(t => `
          <div class="skip-row">
            <span class="skip-check" style="color:var(--accent)">✓</span>
            <span>Topic ${t.label}: ${t.name}</span>
            <span class="skip-arrow" style="margin-left:auto">→</span>
            <span style="font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--accent)">Taught · mastered</span>
          </div>
        `).join('')}
      </div>

      ${nextMod ? `
        <button class="start-btn" onclick="goNextModule()" style="background:${nextMod.color}">
          Start Module ${state.currentModule + 2}: ${nextMod.shortTitle} →
        </button>
      ` : `
        <button class="start-btn" style="background:var(--accent2)">
          🎉 All Modules Complete — Grade 5 Done!
        </button>
      `}
    </div>
  `;
}

function goNextModule() {
  state.currentModule++;
  state.phase = 'intro';
  state.assessIdx = 0;
  state.assessAnswers = [];
  state.gapTopics = [];
  state.passTopics = [];
  state.lessonQueue = [];
  state.lessonIdx = 0;
  state.lessonMastery = 0;
  saveState();
  render();
}

// ══════════════════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════════════════
function init() {
  try {
    // Force all text white inside the app
    const style = document.createElement('style');
    style.textContent = `
      #content, #content * { color: #ffffff !important; }
      .shell { background: #0d0e14 !important; color: #ffffff !important; }
      .sidebar { background: #16192a !important; }
      .main { background: #0d0e14 !important; }
      input { color: #ffffff !important; }
    `;
    document.head.appendChild(style);
    showStudentPicker();
  } catch(err) {
    // Show error visibly so we can debug
    const el = document.getElementById('content');
    if (el) {
      el.style.color = '#ffffff';
      el.style.padding = '40px';
      el.innerHTML = '<h2 style="color:#ff6b6b;margin-bottom:12px;">Load Error</h2><pre style="color:rgba(255,255,255,0.7);font-size:0.75rem;white-space:pre-wrap;">' + err.toString() + '\n' + (err.stack || '') + '</pre>';
    }
    console.error('Init error:', err);
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
</html>
